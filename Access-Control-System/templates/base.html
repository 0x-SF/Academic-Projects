<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BoolGuard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <!-- Animated grid background -->
  <div class="grid-bg"></div>
  <div class="scan-line"></div>

  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">⬡</span>
      <span class="nav-title">BoolGuard<span class="nav-accent">ACS</span></span>
    </div>
    <div class="nav-links">
      <a href="{{ url_for('login') }}" class="nav-link {% if request.endpoint=='login' %}active{% endif %}">LOGIN</a>
      <a href="{{ url_for('explain') }}" class="nav-link {% if request.endpoint=='explain' %}active{% endif %}">THEORY</a>
      {% if session.get('granted') %}
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">DASHBOARD</a>
      <a href="{{ url_for('logout') }}" class="nav-link logout">LOGOUT</a>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Boolean Algebra Access Control System</span>
    <span class="footer-sep">|</span>
    <span>Class 145</span>
    <span class="footer-sep">|</span>
    <span>Mohammed Khayat &nbsp;·&nbsp; Nawaf Al-Ameeri &nbsp;·&nbsp; Mohammed Al-shaikh</span>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
